# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
project_name: prowler-security-findings-agent
global_settings:
  severity_threshold: MEDIUM
  # Paths below are build artifacts, third-party code, or CDK synth output —
  # any findings in them are either not this repo's bug to fix or will be
  # regenerated on the next build. Scan the source we author.
  ignore_paths:
    - path: "**/node_modules/**"
      reason: "Transitive dependencies — tracked via npm-audit and package-lock.json review"
    - path: "**/cdk.out/**"
      reason: "Generated CloudFormation templates from CDK synth — regenerated each deploy"
    - path: "**/dist/**"
      reason: "Vite build output — regenerated each deploy"
    - path: "**/.ash/**"
      reason: "Previous ASH scan outputs"
    - path: "**/build/**"
      reason: "Package build outputs"
    - path: "**/__pycache__/**"
      reason: "Python bytecode caches"
    - path: "**/*.tsbuildinfo"
      reason: "TypeScript incremental build metadata"
  suppressions: []
fail_on_findings: true
ash_plugin_modules: []
external_reports_to_include: []
converters:
  # Archives (zip layers bundled by CDK) are vendored dependencies, not our
  # source. Disabling the archive converter stops ASH from unpacking and
  # scanning them — we rely on npm-audit + maintainer upstream scanning
  # instead, and prevent the scan from being dominated by asset zips.
  archive:
    enabled: false
    options: {}
  jupyter:
    enabled: true
    options:
      tool_version: '>=7.16.0,<8.0.0'
      install_timeout: 300
scanners:
  bandit:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      confidence_level: all
      ignore_nosec: false
      excluded_paths: []
      additional_formats: []
      tool_version: '>=1.7.0,<2.0.0'
      install_timeout: 300
  cdk-nag:
    enabled: true
    options:
      severity_threshold: null
      nag_packs:
        AwsSolutionsChecks: true
        HIPAASecurityChecks: false
        NIST80053R4Checks: false
        NIST80053R5Checks: false
        PCIDSS321Checks: false
      include_compliant_checks: false
  cfn-nag:
    enabled: true
    options:
      severity_threshold: null
  checkov:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      skip_path: []
      additional_formats:
      - cyclonedx_json
      offline: false
      frameworks:
      - all
      skip_frameworks: []
      tool_version: null
      install_timeout: 300
  detect-secrets:
    enabled: true
    options:
      severity_threshold: null
      baseline_file: null
      scan_settings:
        version: null
        generated_at: null
        plugins_used: []
        filters_used: []
        results: {}
      scan_timeout: 300
  grype:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      offline: false
  npm-audit:
    enabled: true
    options:
      severity_threshold: null
      offline: false
  opengrep:
    enabled: true
    options:
      severity_threshold: null
      config: p/ci
      exclude:
      - '*-converted.py'
      - '*_report_result.txt'
      exclude_rule: []
      severity: []
      metrics: auto
      offline: false
      patterns: []
      version: v1.15.1
  semgrep:
    enabled: true
    options:
      severity_threshold: null
      config: p/ci
      exclude:
      - '*-converted.py'
      - '*_report_result.txt'
      exclude_rule: []
      severity: []
      metrics: auto
      offline: false
      tool_version: null
      install_timeout: 300
  syft:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      exclude: []
      additional_outputs:
      - syft-table
reporters:
  csv:
    enabled: true
    options: {}
  cyclonedx:
    enabled: true
    options: {}
  gitlab-cyclonedx:
    enabled: true
    options:
      category: production
      package_manager_override: null
      language_override: null
      input_file_path_override: null
  html:
    enabled: true
    options: {}
  flat-json:
    enabled: true
    options:
      include_scanner_metrics: true
      include_summary_metrics: true
      include_metadata: true
  gitlab-sast:
    enabled: true
    options:
      exclude_suppressed: false
  github-ghas:
    enabled: true
    options:
      exclude_suppressed: true
  junitxml:
    enabled: true
    options:
      respect_severity_threshold: true
  markdown:
    enabled: true
    options:
      include_summary: true
      include_findings_table: false
      include_detailed_findings: true
      max_detailed_findings: 20
      top_hotspots_limit: 10
      use_collapsible_details: true
      compact: false
  ocsf:
    enabled: true
    options: {}
  sarif:
    enabled: true
    options: {}
  spdx:
    enabled: false
    options: {}
  text:
    enabled: true
    options:
      include_summary: true
      include_findings_table: false
      include_detailed_findings: false
      max_detailed_findings: 20
      top_hotspots_limit: 20
  yaml:
    enabled: false
    options: {}
