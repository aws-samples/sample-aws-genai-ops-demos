AWSTemplateFormatVersion: '2010-09-09'
Description: VPN Demo - Site-to-Site VPN with DevOps Agent integration (AL2023 + Libreswan + GoBGP)

Parameters:
  RoutingType:
    Type: String
    AllowedValues: [static, bgp]
    Default: bgp
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
  DevOpsAgentWebhookUrl:
    Type: String
    Default: ''
  DevOpsAgentWebhookSecret:
    Type: String
    NoEcho: true
    Default: ''

Conditions:
  HasWebhook: !Not [!Equals [!Ref DevOpsAgentWebhookUrl, '']]
  IsStatic: !Equals [!Ref RoutingType, 'static']

Resources:
  # ============ Cloud VPC (10.0.0.0/16) ============
  CloudVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: vpn-demo-cloud-vpc}]

  CloudSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref CloudVpc
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: vpn-demo-cloud-subnet}]

  CloudIgw:
    Type: AWS::EC2::InternetGateway
  CloudIgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref CloudVpc, InternetGatewayId: !Ref CloudIgw}

  CloudRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref CloudVpc}
  CloudDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: CloudIgwAttach
    Properties: {RouteTableId: !Ref CloudRouteTable, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref CloudIgw}
  CloudSubnetRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref CloudSubnet, RouteTableId: !Ref CloudRouteTable}
  CloudToOnpremRoute:
    Type: AWS::EC2::Route
    DependsOn: VgwAttach
    Properties: {RouteTableId: !Ref CloudRouteTable, DestinationCidrBlock: 172.16.0.0/16, GatewayId: !Ref Vgw}

  CloudSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cloud VPC - allow ICMP from on-prem + SSH
      VpcId: !Ref CloudVpc
      SecurityGroupIngress:
        - {IpProtocol: icmp, FromPort: -1, ToPort: -1, CidrIp: 172.16.0.0/16}
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: 0.0.0.0/0}

  CloudInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref CloudSubnet
      SecurityGroupIds: [!Ref CloudSg]
      Tags: [{Key: Name, Value: vpn-demo-cloud-instance}]

  # ============ On-Prem VPC (172.16.0.0/16) ============
  OnPremVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.16.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: vpn-demo-onprem-vpc}]

  OnPremSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref OnPremVpc
      CidrBlock: 172.16.1.0/24
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: vpn-demo-onprem-subnet}]

  OnPremIgw:
    Type: AWS::EC2::InternetGateway
  OnPremIgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref OnPremVpc, InternetGatewayId: !Ref OnPremIgw}

  OnPremRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref OnPremVpc}
  OnPremDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: OnPremIgwAttach
    Properties: {RouteTableId: !Ref OnPremRouteTable, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref OnPremIgw}
  OnPremSubnetRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref OnPremSubnet, RouteTableId: !Ref OnPremRouteTable}

  OnPremSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: On-prem VPC - IKE + SSH + ICMP
      VpcId: !Ref OnPremVpc
      SecurityGroupIngress:
        - {IpProtocol: icmp, FromPort: -1, ToPort: -1, CidrIp: 10.0.0.0/16}
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: 0.0.0.0/0}
        - {IpProtocol: udp, FromPort: 500, ToPort: 500, CidrIp: 0.0.0.0/0}
        - {IpProtocol: udp, FromPort: 4500, ToPort: 4500, CidrIp: 0.0.0.0/0}

  CgwEip:
    Type: AWS::EC2::EIP
    Properties: {Domain: vpc}

  CgwInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref OnPremSubnet
      SecurityGroupIds: [!Ref OnPremSg]
      SourceDestCheck: false
      UserData:
        Fn::Base64: |
          #!/bin/bash
          exec > /var/log/vpn-userdata.log 2>&1
          set -e
          yum install -y libreswan iptables-nft iproute-tc
          ipsec initnss 2>/dev/null || true
          curl -sL https://github.com/osrg/gobgp/releases/download/v3.30.0/gobgp_3.30.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin
          cat > /etc/sysctl.d/99-vpn.conf <<'EOF'
          net.ipv4.ip_forward = 1
          net.ipv4.conf.all.rp_filter = 0
          net.ipv4.conf.default.rp_filter = 0
          EOF
          sysctl -p /etc/sysctl.d/99-vpn.conf
          echo 'USERDATA_COMPLETE'
      Tags: [{Key: Name, Value: vpn-demo-cgw}]

  CgwEipAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties: {AllocationId: !GetAtt CgwEip.AllocationId, InstanceId: !Ref CgwInstance}

  # ============ VPN ============
  Vgw:
    Type: AWS::EC2::VPNGateway
    Properties: {Type: ipsec.1, Tags: [{Key: Name, Value: vpn-demo-vgw}]}
  VgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref CloudVpc, VpnGatewayId: !Ref Vgw}

  Cgw:
    Type: AWS::EC2::CustomerGateway
    DependsOn: CgwEipAssoc
    Properties:
      Type: ipsec.1
      BgpAsn: 65000
      IpAddress: !Ref CgwEip
      Tags: [{Key: Name, Value: vpn-demo-cgw}]

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    DependsOn: VpnLogGroup
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref Cgw
      VpnGatewayId: !Ref Vgw
      StaticRoutesOnly: !If [IsStatic, true, false]
      VpnTunnelOptionsSpecifications:
        - TunnelInsideCidr: 169.254.10.0/30
          LogOptions:
            CloudwatchLogOptions:
              LogEnabled: true
              LogGroupArn: !GetAtt VpnLogGroup.Arn
              LogOutputFormat: json
              BgpLogEnabled: true
              BgpLogGroupArn: !GetAtt VpnLogGroup.Arn
              BgpLogOutputFormat: json
        - TunnelInsideCidr: 169.254.10.4/30
          LogOptions:
            CloudwatchLogOptions:
              LogEnabled: true
              LogGroupArn: !GetAtt VpnLogGroup.Arn
              LogOutputFormat: json
              BgpLogEnabled: true
              BgpLogGroupArn: !GetAtt VpnLogGroup.Arn
              BgpLogOutputFormat: json
      Tags: [{Key: Name, Value: vpn-demo-connection}]

  VpnStaticRoute:
    Type: AWS::EC2::VPNConnectionRoute
    Condition: IsStatic
    Properties:
      VpnConnectionId: !Ref VpnConnection
      DestinationCidrBlock: 172.16.0.0/16

  # ============ Monitoring ============
  VpnLogGroup:
    Type: AWS::Logs::LogGroup
    Properties: {LogGroupName: /vpn-demo/tunnel-logs, RetentionInDays: 7}

  AlarmSnsTopic:
    Type: AWS::SNS::Topic
    Properties: {TopicName: vpn-demo-tunnel-alarm}

  # ============ Webhook Lambda (conditional) ============
  WebhookLambdaRole:
    Type: AWS::IAM::Role
    Condition: HasWebhook
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      ManagedPolicyArns: [arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole]

  WebhookLambda:
    Type: AWS::Lambda::Function
    Condition: HasWebhook
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt WebhookLambdaRole.Arn
      Environment:
        Variables:
          WEBHOOK_URL: !Ref DevOpsAgentWebhookUrl
          WEBHOOK_SECRET: !Ref DevOpsAgentWebhookSecret
      Code:
        ZipFile: |
          import json, os, hmac, hashlib, base64, urllib.request
          from datetime import datetime, timezone
          def handler(event, context):
              message = event['Records'][0]['Sns']['Message']
              timestamp = datetime.now(timezone.utc).isoformat()
              payload = json.dumps({
                  'eventType': 'incident', 'incidentId': context.aws_request_id,
                  'action': 'created', 'priority': 'HIGH',
                  'title': 'VPN Tunnel Alert', 'description': message,
                  'service': 'AWS-VPN', 'timestamp': timestamp,
                  'data': {'rawMessage': message}
              })
              secret = os.environ['WEBHOOK_SECRET']
              sig = base64.b64encode(hmac.new(
                  secret.encode(), f"{timestamp}:{payload}".encode(), hashlib.sha256
              ).digest()).decode()
              req = urllib.request.Request(os.environ['WEBHOOK_URL'], data=payload.encode(), headers={
                  'Content-Type': 'application/json',
                  'x-amzn-event-timestamp': timestamp, 'x-amzn-event-signature': sig
              })
              urllib.request.urlopen(req)

  WebhookLambdaPermission:
    Type: AWS::Lambda::Permission
    Condition: HasWebhook
    Properties: {FunctionName: !Ref WebhookLambda, Action: lambda:InvokeFunction, Principal: sns.amazonaws.com, SourceArn: !Ref AlarmSnsTopic}

  WebhookSnsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasWebhook
    Properties: {TopicArn: !Ref AlarmSnsTopic, Protocol: lambda, Endpoint: !GetAtt WebhookLambda.Arn}

Outputs:
  VpnConnectionId:
    Value: !Ref VpnConnection
  CgwInstanceId:
    Value: !Ref CgwInstance
  CgwPublicIp:
    Value: !Ref CgwEip
  CloudInstanceId:
    Value: !Ref CloudInstance
  CloudInstancePrivateIp:
    Value: !GetAtt CloudInstance.PrivateIp
  VpnLogGroupName:
    Value: !Ref VpnLogGroup
  VpnLogGroupArn:
    Value: !GetAtt VpnLogGroup.Arn
  AlarmSnsTopicArn:
    Value: !Ref AlarmSnsTopic
  RoutingType:
    Value: !Ref RoutingType
