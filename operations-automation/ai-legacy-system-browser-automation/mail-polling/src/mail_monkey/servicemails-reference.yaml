    We are writing to notify you that between {date} and {date2}, some EC2 Launch Templates that you created or modified using the EC2 Management Console may have resulted in templates missing one or more security groups. This issue would not have decreased the security posture of EC2 Instances launched from these templates as rules on EC2 security groups can only grant connectivity to/from instances. However, instances launched from these templates may result in an instance with limited connectivity to/from the instance. We have resolved the issue that allowed creation of Launch Templates with missing security groups and the service is operating normally.

  template:  |-
