apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
  labels:
    app.kubernetes.io/name: fluent-bit
    app.kubernetes.io/part-of: __ENVIRONMENT__ops-agent-eks
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                 5
        Log_Level             info
        Daemon                off
        Parsers_File          parsers.conf
        HTTP_Server           On
        HTTP_Listen           0.0.0.0
        HTTP_Port             2020
        storage.path          /var/fluent-bit/state/flb-storage/
        storage.sync          normal
        storage.checksum      off
        storage.max_chunks_up 128

    @INCLUDE input-payment-processor.conf
    @INCLUDE input-merchant-gateway.conf
    @INCLUDE input-webhook-service.conf
    @INCLUDE filter-kubernetes.conf
    @INCLUDE output-cloudwatch.conf

  input-payment-processor.conf: |
    [INPUT]
        Name                tail
        Tag                 payment-processor.*
        Path                /var/log/containers/*payment-processor*.log
        multiline.parser    docker, cri
        Mem_Buf_Limit       50MB
        Skip_Long_Lines     On
        Refresh_Interval    10
        storage.type        filesystem
        DB                  /var/fluent-bit/state/payment-processor.db

  input-merchant-gateway.conf: |
    [INPUT]
        Name                tail
        Tag                 merchant-gateway.*
        Path                /var/log/containers/*merchant-gateway*.log
        multiline.parser    docker, cri
        Mem_Buf_Limit       50MB
        Skip_Long_Lines     On
        Refresh_Interval    10
        storage.type        filesystem
        DB                  /var/fluent-bit/state/merchant-gateway.db

  input-webhook-service.conf: |
    [INPUT]
        Name                tail
        Tag                 webhook-service.*
        Path                /var/log/containers/*webhook-service*.log
        multiline.parser    docker, cri
        Mem_Buf_Limit       50MB
        Skip_Long_Lines     On
        Refresh_Interval    10
        storage.type        filesystem
        DB                  /var/fluent-bit/state/webhook-service.db

  filter-kubernetes.conf: |
    [FILTER]
        Name                kubernetes
        Match               *
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

  output-cloudwatch.conf: |
    [OUTPUT]
        Name                cloudwatch_logs
        Match               payment-processor.*
        region              __AWS_REGION__
        log_group_name      /aws/eks/__ENVIRONMENT__ops-agent-eks-__ENVIRONMENT__/payment-processor
        log_stream_prefix   from-fluent-bit/
        auto_create_group   true

    [OUTPUT]
        Name                cloudwatch_logs
        Match               merchant-gateway.*
        region              __AWS_REGION__
        log_group_name      /aws/eks/__ENVIRONMENT__ops-agent-eks-__ENVIRONMENT__/merchant-gateway
        log_stream_prefix   from-fluent-bit/
        auto_create_group   true

    [OUTPUT]
        Name                cloudwatch_logs
        Match               webhook-service.*
        region              __AWS_REGION__
        log_group_name      /aws/eks/__ENVIRONMENT__ops-agent-eks-__ENVIRONMENT__/webhook-service
        log_stream_prefix   from-fluent-bit/
        auto_create_group   true

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S
