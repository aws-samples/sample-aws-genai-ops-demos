---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: merchant-gateway-sa
  namespace: payment-demo
  labels:
    app.kubernetes.io/name: merchant-gateway
    app.kubernetes.io/part-of: devops-agent-eks
  annotations:
    # IRSA annotation - role ARN will be substituted per environment
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/MerchantGatewayRole
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-processor-sa
  namespace: payment-demo
  labels:
    app.kubernetes.io/name: payment-processor
    app.kubernetes.io/part-of: devops-agent-eks
  annotations:
    # IRSA annotation - role ARN will be substituted per environment
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/PaymentProcessorRole
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-service-sa
  namespace: payment-demo
  labels:
    app.kubernetes.io/name: webhook-service
    app.kubernetes.io/part-of: devops-agent-eks
  annotations:
    # IRSA annotation - role ARN will be substituted per environment
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/WebhookServiceRole
