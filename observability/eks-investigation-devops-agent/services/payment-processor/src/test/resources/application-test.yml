spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

aws:
  region: eu-central-1
  sqs:
    enabled: false
    payment-events-queue-url:

logging:
  level:
    root: WARN
    com.helios.payment: DEBUG
