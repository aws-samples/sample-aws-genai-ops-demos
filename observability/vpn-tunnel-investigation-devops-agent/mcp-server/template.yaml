AWSTemplateFormatVersion: '2010-09-09'
Description: MCP Server for AWS VPN DevOps Agent Demo

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
  S3Key:
    Type: String
    Description: S3 key for the Lambda deployment package

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  McpFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: vpn-devops-mcp-server
      Runtime: python3.12
      Handler: app.lambda_handler
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt LambdaRole.Arn

  McpApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: vpn-devops-mcp-api

  McpResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref McpApi
      ParentId: !GetAtt McpApi.RootResourceId
      PathPart: mcp

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref McpApi
      ResourceId: !Ref McpResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${McpFunction.Arn}/invocations

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref McpApi
      ResourceId: !Ref McpResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${McpFunction.Arn}/invocations

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref McpFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${McpApi}/*

  Deployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref McpApi

  ProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref McpApi
      DeploymentId: !Ref Deployment
      StageName: prod

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ProdStage
    Properties:
      Name: vpn-devops-mcp-api-key
      Enabled: true
      StageKeys:
        - RestApiId: !Ref McpApi
          StageName: prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ProdStage
    Properties:
      UsagePlanName: vpn-devops-mcp-usage-plan
      ApiStages:
        - ApiId: !Ref McpApi
          Stage: prod

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  McpEndpoint:
    Description: MCP Server endpoint URL
    Value: !Sub https://${McpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/mcp
  ApiKeyId:
    Description: API Key ID (retrieve value via AWS CLI)
    Value: !Ref ApiKey
