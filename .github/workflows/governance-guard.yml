name: Governance Guard

on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  issues: write

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      # No checkout — we only use the GitHub API to inspect the PR file list.
      # This is safe with pull_request_target because no fork code is executed.

      - name: Inspect PR and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            // --- Governance file changes ---
            const governanceFiles = files.filter(f =>
              f.filename.startsWith('.kiro/') ||
              f.filename.startsWith('.github/')
            );

            if (governanceFiles.length > 0) {
              const fileList = governanceFiles.map(f => `- \`${f.filename}\` (${f.status})`).join('\n');

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: ['governance-change']
                });
              } catch (e) {
                core.warning(`Could not add governance label: ${e.message}`);
              }

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: `## ⚠️ Governance File Changes Detected\n\nThis PR modifies governance files that control project standards and CI/CD:\n\n${fileList}\n\n**These changes require maintainer approval.** Please ensure changes are intentional and reviewed by a repo owner.`
                });
              } catch (e) {
                core.warning(`Could not post governance comment: ${e.message}`);
              }

              core.warning('Governance files modified — maintainer review required');
            }

            // --- Deploy-exempt marker ---
            const noDeployFiles = files.filter(f =>
              f.filename.endsWith('/.no-deploy') && f.status === 'added'
            );

            if (noDeployFiles.length > 0) {
              const demoList = noDeployFiles.map(f => {
                const demo = f.filename.replace('/.no-deploy', '');
                return `- \`${demo}\``;
              }).join('\n');

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: ['deploy-exempt']
                });
              } catch (e) {
                core.warning(`Could not add deploy-exempt label: ${e.message}`);
              }

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: `## ℹ️ Deploy-Exempt Demos\n\nThe following demos use a \`.no-deploy\` marker (no deployment scripts required):\n\n${demoList}\n\nPlease verify the exemption is appropriate during review.`
                });
              } catch (e) {
                core.warning(`Could not post deploy-exempt comment: ${e.message}`);
              }
            }
